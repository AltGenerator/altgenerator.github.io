<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AltGenerator+</title>
    <style>
        :root {
            --discord-color: #5865F2;
            --red-accent: #ff4d4d;
            --bg-dark: #090A0F;
            --panel-bg: rgba(20, 22, 31, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #1B2735 0%, #090A0F 100%);
        }

        /* --- Error Overlay --- */
        #errorOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(9, 10, 15, 0.98);
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .error-box {
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 77, 77, 0.2);
            background: rgba(255, 255, 255, 0.03);
        }

        /* --- Dashboard UI --- */
        #dashboardUI {
            display: none;
            height: 100%;
        }

        nav {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pfp-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--red-accent);
            cursor: pointer;
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
        }

        .profile-panel {
            position: absolute;
            top: 70px;
            right: 40px;
            width: 200px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .profile-panel.active { display: flex; }

        .logout-btn {
            background: var(--red-accent);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 70vh;
        }

        .welcome-name { color: var(--red-accent); text-shadow: 0 0 20px var(--red-accent); }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <div id="errorOverlay">
        <div class="error-box">
            <h2 style="color:var(--red-accent);">Error when logging in!</h2>
            <p>Redirecting to login in <span id="countdown">5</span> seconds...</p>
            <p><a href="index.html" style="color:var(--discord-color); font-weight:bold; text-decoration:none;">Click here</a> if not redirected.</p>
        </div>
    </div>

    <div id="dashboardUI">
        <nav>
            <div style="font-weight:800; font-size:1.5rem;"><span style="color:var(--red-accent)">Alt</span>Generator+</div>
            <div style="position:relative;">
                <div id="pfpBtn" class="pfp-btn"></div>
                <div id="profilePanel" class="profile-panel">
                    <div id="panelUsername" style="text-align:center;">User#0000</div>
                    <hr style="opacity:0.1; width:100%;">
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
        </nav>
        <div class="main-content">
            <h1>Welcome, <span id="displayUsername" class="welcome-name">User</span></h1>
            <p style="opacity:0.5;">Authentication Successful.</p>
        </div>
    </div>

    <script>
        // --- THE "BRIDGE" LOGIC ---
        // This runs the moment the page loads
        function initAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const hasDiscordCode = urlParams.has('code');

            // 1. If we have a code in the URL, FORCE login state
            if (hasDiscordCode) {
                console.log("Discord code detected! Logging in...");
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userData', JSON.stringify({
                    username: "Member", 
                    pfp: "https://cdn.discordapp.com/embed/avatars/0.png"
                }));
                // Clean the URL so the code doesn't stay there
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // 2. Now check if we are logged in
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const userData = JSON.parse(localStorage.getItem('userData'));

            if (isLoggedIn === 'true' && userData) {
                document.getElementById('dashboardUI').style.display = 'block';
                document.getElementById('displayUsername').innerText = userData.username;
                document.getElementById('panelUsername').innerText = userData.username;
                document.getElementById('pfpBtn').style.backgroundImage = `url(${userData.pfp})`;
            } else {
                startRedirect();
            }
        }

        function startRedirect() {
            const overlay = document.getElementById('errorOverlay');
            const countdownEl = document.getElementById('countdown');
            overlay.style.display = 'flex';
            let time = 5;
            const timer = setInterval(() => {
                time--;
                countdownEl.innerText = time;
                if (time <= 0) {
                    clearInterval(timer);
                    window.location.href = 'index.html';
                }
            }, 1000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // PFP Toggle
        const pfpBtn = document.getElementById('pfpBtn');
        const profilePanel = document.getElementById('profilePanel');
        pfpBtn.onclick = (e) => {
            e.stopPropagation();
            profilePanel.classList.toggle('active');
        };
        window.onclick = () => profilePanel.classList.remove('active');

        // Star Background
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<100; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2});
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y -= 0.2; if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
        window.onresize = resize;
        resize(); draw();

        // RUN AUTH
        initAuth();
    </script>
</body>
</html>
