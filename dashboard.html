<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AltGenerator+</title>
    <style>
        :root {
            --discord-color: #5865F2;
            --red-accent: #ff4d4d;
            --bg-dark: #090A0F;
            --panel-bg: rgba(20, 22, 31, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #1B2735 0%, #090A0F 100%);
        }

        /* --- Navbar --- */
        nav {
            width: 100%;
            height: 80px;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box; /* Prevents padding from pushing items off screen */
            position: relative;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        /* --- Profile Section --- */
        .profile-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .pfp-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--red-accent);
            cursor: pointer;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.4);
            transition: transform 0.2s ease;
        }

        .pfp-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--red-accent);
        }

        .profile-panel {
            position: absolute;
            top: 55px; /* Spaced below the PFP */
            right: 0;  /* Aligns to the right edge of the PFP */
            width: 220px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .profile-panel.active {
            display: flex;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .username-display {
            font-weight: 700;
            color: #fff;
            text-align: center;
            font-size: 1rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .logout-btn {
            background: var(--red-accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #e63939;
        }

        /* --- Content --- */
        #dashboardUI { display: none; }
        
        .main-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 80px);
            text-align: center;
        }

        .welcome-name {
            color: var(--red-accent);
            text-shadow: 0 0 20px var(--red-accent);
        }

        /* Error Overlay */
        #errorOverlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(9, 10, 15, 0.98);
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <div id="errorOverlay">
        <h2 style="color:var(--red-accent);">Unauthorized Access</h2>
        <p>Redirecting to login in <span id="countdown">5</span>s...</p>
    </div>

    <div id="dashboardUI">
        <nav>
            <div class="logo">
                <span style="color:var(--red-accent)">Alt</span>Generator+
            </div>
            
            <div class="profile-wrapper">
                <div id="pfpBtn" class="pfp-btn"></div>
                
                <div id="profilePanel" class="profile-panel">
                    <div class="username-display" id="panelUsername">Loading...</div>
                    <div class="divider"></div>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <h1>Welcome, <span class="welcome-name" id="displayUsername">User</span></h1>
            <p style="opacity: 0.6;">Your premium dashboard is ready.</p>
        </main>
    </div>

    <script>
        function initAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const userParam = urlParams.get('username');
            const pfpParam = urlParams.get('pfp');

            // 1. Capture data from Backend redirect
            if (userParam && pfpParam) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userData', JSON.stringify({
                    username: userParam, 
                    pfp: decodeURIComponent(pfpParam)
                }));
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // 2. Check session
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const userData = JSON.parse(localStorage.getItem('userData'));

            if (isLoggedIn === 'true' && userData) {
                document.getElementById('dashboardUI').style.display = 'block';
                document.getElementById('displayUsername').innerText = userData.username;
                document.getElementById('panelUsername').innerText = userData.username;
                
                // Applying the real PFP
                const pfpElement = document.getElementById('pfpBtn');
                pfpElement.style.backgroundImage = `url('${userData.pfp}')`;
            } else {
                handleRedirection();
            }
        }

        function handleRedirection() {
            const overlay = document.getElementById('errorOverlay');
            overlay.style.display = 'flex';
            let time = 5;
            const timer = setInterval(() => {
                time--;
                document.getElementById('countdown').innerText = time;
                if(time <= 0) {
                    clearInterval(timer);
                    window.location.href = 'index.html';
                }
            }, 1000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // UI Interactions
        const pfpBtn = document.getElementById('pfpBtn');
        const profilePanel = document.getElementById('profilePanel');

        pfpBtn.onclick = (e) => {
            e.stopPropagation();
            profilePanel.classList.toggle('active');
        };

        window.onclick = () => profilePanel.classList.remove('active');

        // Star Background
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<120; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2});
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y -= 0.2; if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
        window.onresize = resize;
        resize(); draw();
        initAuth();
    </script>
</body>
</html>
