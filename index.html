<!DOCTYPE html>
<html>
<head>
  <title>Alt Generator</title>

  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 40px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 12px 25px;
      font-size: 18px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #result {
      margin-top: 30px;
      font-size: 24px;
      color: #38bdf8;
    }
  </style>
</head>

<body>

  <h1>Alt Generator ⚡</h1>
  <p>Click the button to generate a random username</p>

  <button onclick="generate()">Generate</button>

  <div id="result"></div>

  <script>
    const words = [
      "Shadow", "Nova", "Ghost", "Vortex", "Blaze",
      "Lunar", "Frost", "Storm", "Pixel", "Venom"
    ];

    function generate() {
      let word = words[Math.floor(Math.random() * words.length)];
      let number = Math.floor(Math.random() * 1000);
      document.getElementById("result").innerText = word + number;
    }
  </script>

</body>
</html>
